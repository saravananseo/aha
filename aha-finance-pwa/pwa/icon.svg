<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#07090f"/>
  <rect width="512" height="512" rx="112" fill="url(#grad)" opacity="0.3"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- A letter -->
  <text x="256" y="320" font-family="Arial Black, sans-serif" font-size="280" font-weight="900" text-anchor="middle" fill="#22c55e" opacity="0.95">A</text>
  <!-- Accent bar -->
  <rect x="80" y="380" width="352" height="8" rx="4" fill="#22c55e" opacity="0.4"/>
  <!-- HA letters small -->
  <text x="256" y="460" font-family="Arial, sans-serif" font-size="64" font-weight="700" text-anchor="middle" fill="#6b7394" letter-spacing="24">HA</text>
</svg>
